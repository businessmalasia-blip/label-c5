usic. Luego Bad Bunny lanzó varios temas como “Diles (Remix)” y “Tú No Vive Así”, los cuales ayudaron a despegar su carrera. En el 2017 Bad Bunny alcanzó un éxito internacional. Esto fue gracias a su sencillo “Soy Peor” y su aparición en temas como “Si Tu Novio Te Deja Sola\" con J Balvin y “Krippy Kush” con Farruko. Bad Bunny se ha colocado como el mayor exponente del trap latino, y esto lo ha llevado a colaborar con artistas estadounidenses como Cardi B, Nicki Minaj, Travis Scott, Future y Drake.","socialLinks":{"Instagram":"https://www.instagram.com/badbunnypr","Twitter":"https://twitter.com/bad_bunnypr","iHeartRadio":"https://www.iheart.com/artist/bad-bunny-31333415","Spotify":"https://open.spotify.com/artist/4q3ewBCX7sLwd24euuV69X","SoundCloud":"https://www.soundcloud.com/badbunny15","Youtube":"https://www.youtube.com/channel/UCmBA_wu8xGg1OfOkfW13Q0Q","Facebook":"https://www.facebook.com/BadBunnyOfficial"}}},"totalUnfilteredEventsCount":19,"totalUnfilteredParkingCount":0,"citySuggestions":[{"city":"Nanterre","country":"FR","lat":"48.894924","long":"2.229123","eventCount":2},{"city":"Brussels","country":"BE","lat":"50.8956998","long":"4.334072200000037","eventCount":1},{"city":"London","country":"GB","lat":"51.6042856","long":"-0.06638129999999999","eventCount":2},{"city":"Düsseldorf","country":"DE","lat":"51.2615824","long":"6.733190200000001","eventCount":2},{"city":"Arnhem","country":"NL","lat":"51.9627848","long":"5.893447600000001","eventCount":2},{"city":"Milan","country":"IT","lat":"45.49008659999999","long":"9.113997399999999","eventCount":2},{"city":"Marseille","country":"FR","lat":"43.269827","long":"5.395887300000001","eventCount":1},{"city":"Madrid","country":"ES","lat":"40.43744039999999","long":"-3.6016555","eventCount":4},{"city":"Warsaw","country":"PL","lat":"52.2394957","long":"21.0457909","eventCount":1},{"city":"Stockholm - Solna","country":"SE","lat":"59.3727005","long":"18.0002317","eventCount":2}],"ipLocation":{"cityId":0,"latitude":"48.856
